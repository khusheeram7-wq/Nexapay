<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPay - Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8F9FA] flex justify-center items-center min-h-screen">

    <div class="bg-white w-full max-w-md min-h-screen md:min-h-[850px] flex flex-col justify-between shadow-xl md:rounded-3xl overflow-hidden relative border border-gray-100">
        
        <div class="flex-1 overflow-y-auto pb-24 hide-scrollbar">
            
            <div class="px-5 pt-6 pb-2 bg-white sticky top-0 z-40">
                <h1 class="text-2xl font-black text-[#1E56B2] tracking-tight">Team</h1>
            </div>

            <div class="px-4 mt-2">
                <div class="bg-[#3A3D42] text-gray-200 rounded-2xl p-5 shadow-md relative">
                    <div class="grid grid-cols-2 gap-y-4 gap-x-2 text-left">
                        <div>
                            <span id="lblDisplayCommission" class="text-2xl font-black text-white">0.00</span>
                            <p class="text-[11px] font-bold text-gray-400 mt-0.5">Commission</p>
                        </div>
                        <div>
                            <span id="lblDisplayTeamRecharge" class="text-2xl font-black text-white">0</span>
                            <p class="text-[11px] font-bold text-gray-400 mt-0.5">Team Recharge</p>
                        </div>
                        <div class="border-t border-gray-600/50 pt-3">
                            <span id="lblDisplayQuotaA" class="text-lg font-black text-white">0.0</span>
                            <p class="text-[10px] font-medium text-gray-400 mt-0.5">Total Weekly Team Quota(A)</p>
                        </div>
                        <div class="border-t border-gray-600/50 pt-3">
                            <span id="lblDisplayQuotaAB" class="text-lg font-black text-white">0.0</span>
                            <p class="text-[10px] font-medium text-gray-400 mt-0.5">Total Weekly Team Quota(A+B)</p>
                        </div>
                    </div>

                    <div onclick="toggleTimeFilterDropdown()" class="mt-4 pt-3 border-t border-gray-600/50 flex justify-between items-center text-xs font-bold text-gray-300 cursor-pointer select-none">
                        <span id="lblSelectedTimeframe">This Week</span>
                        <i id="iconTimeframeArrow" class="fa-solid fa-chevron-down text-[10px] text-gray-400 transition-transform"></i>
                    </div>

                    <div id="boxTimeframeDropdown" class="absolute left-4 right-4 mt-1 bg-white text-gray-800 rounded-xl shadow-xl border border-gray-100 hidden z-50">
                        <button onclick="selectTimeframeScope('This Week')" class="w-full text-left px-4 py-3 text-xs font-bold hover:bg-gray-50 border-b border-gray-50">This Week</button>
                        <button onclick="selectTimeframeScope('Last Week')" class="w-full text-left px-4 py-3 text-xs font-bold hover:bg-gray-50">Last Week</button>
                    </div>

                    <div class="mt-4 flex items-center space-x-1.5 text-xs text-gray-400">
                        <i class="fa-solid fa-user-group text-[10px]"></i>
                        <span id="lblDisplayTeamCount" class="font-bold text-white">0</span>
                    </div>
                </div>
            </div>

            <div class="px-4 mt-5">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2">Invite Code</h3>
                <div class="bg-white border border-gray-100 rounded-xl p-3.5 flex justify-between items-center shadow-3xs">
                    <p id="txtInviteCodeUrl" class="text-xs font-mono font-bold text-[#1E56B2] truncate pr-3">Loading Link...</p>
                    <button onclick="copyInviteUrlLink()" class="bg-blue-50 text-[#1E56B2] hover:bg-blue-100 p-2.5 rounded-xl text-xs transition-all shrink-0 cursor-pointer">
                        <i class="fa-regular fa-copy"></i>
                    </button>
                </div>
            </div>

            <div class="px-4 mt-5">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-3">Team Detail</h3>
                <div id="boxTeamUsersListContainer" class="space-y-2.5"></div>
            </div>

        </div>

        <div class="absolute bottom-0 inset-x-0 bg-white border-t border-gray-100 px-2 py-2.5 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-40">
            <button onclick="window.location.href='home.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-house text-lg"></i> <span class="text-[10px] tracking-wide">Home</span>
            </button>
            <button onclick="window.location.href='deposit.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-right-left text-lg"></i> <span class="text-[10px] tracking-wide">Deposit</span>
            </button>
            <button onclick="window.location.href='upi.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-briefcase text-lg"></i> <span class="text-[10px] tracking-wide">UPI</span>
            </button>
            <button onclick="window.location.href='team.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-[#1E56B2] font-bold transition-all cursor-pointer">
                <i class="fa-solid fa-chart-pie text-lg"></i> <span class="text-[10px] tracking-wide">Team</span>
            </button>
            <button onclick="window.location.href='me.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-user-astronaut text-lg"></i> <span class="text-[10px] tracking-wide">Me</span>
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, doc, collection, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHoR7wojkpTZZPR-gcfDnPW8aOTuoiaAU",
            authDomain: "nexapay-342d0.firebaseapp.com",
            databaseURL: "https://nexapay-342d0-default-rtdb.firebaseio.com",
            projectId: "nexapay-342d0",
            storageBucket: "nexapay-342d0.firebasestorage.app",
            messagingSenderId: "305096071099",
            appId: "1:305096071099:web:3db1e75a2669adbcae569e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.sessionUserIdentityId = localStorage.getItem('sessionUserIdentityId') || '20014035';
        let currentActiveTimeScopeFilter = 'This Week';

        let commRateA = 10; 
        let commRateB = 5;  

        function listenCommissionConfigurationParameters() {
            onSnapshot(doc(db, "system_settings", "master_config"), (docSnap) => {
                if (docSnap.exists()) {
                    const settingData = docSnap.data();
                    if(settingData.level1Comm) commRateA = parseFloat(settingData.level1Comm);
                    if(settingData.level2Comm) commRateB = parseFloat(settingData.level2Comm);
                    buildRealtimeDownlinesNetworkTreeMatrix(); 
                }
            });
        }

        function checkTimestampInsideTimeframeScope(dateString, targetScope) {
            if (!dateString) return false;
            const rowDate = new Date(dateString.includes('/') ? dateString.replace(/,/g, '') : dateString);
            if (isNaN(rowDate)) return false;

            const targetCurrentTime = new Date();
            const currentDayOfWeek = targetCurrentTime.getDay(); 
            
            const currentWeekMonday = new Date(targetCurrentTime);
            currentWeekMonday.setDate(targetCurrentTime.getDate() - (currentDayOfWeek === 0 ? 6 : currentDayOfWeek - 1));
            currentWeekMonday.setHours(0,0,0,0);

            const lastWeekMonday = new Date(currentWeekMonday);
            lastWeekMonday.setDate(currentWeekMonday.getDate() - 7);
            
            const lastWeekSunday = new Date(currentWeekMonday);
            lastWeekSunday.setMilliseconds(-1);

            if (targetScope === 'This Week') {
                return rowDate >= currentWeekMonday;
            } else if (targetScope === 'Last Week') {
                return rowDate >= lastWeekMonday && rowDate <= lastWeekSunday;
            }
            return false;
        }

        window.toggleTimeFilterDropdown = function() {
            document.getElementById('boxTimeframeDropdown').classList.toggle('hidden');
            document.getElementById('iconTimeframeArrow').classList.toggle('rotate-180');
        };

        window.selectTimeframeScope = function(scopeLabelText) {
            currentActiveTimeScopeFilter = scopeLabelText;
            document.getElementById('lblSelectedTimeframe').innerText = scopeLabelText;
            window.toggleTimeFilterDropdown();
            buildRealtimeDownlinesNetworkTreeMatrix();
        };

        window.copyInviteUrlLink = function() {
            const inviteCodeVal = document.getElementById('txtInviteCodeUrl').innerText;
            navigator.clipboard.writeText(inviteCodeVal);
            alert("Registration Referral Link copied successfully!");
        };

        window.buildRealtimeDownlinesNetworkTreeMatrix = function() {
            // 🚨 UPDATED LINK: app-nexapay online structure injected safely 🚨
            document.getElementById('txtInviteCodeUrl').innerText = `https://app-nexapay.online/regist?code=${window.sessionUserIdentityId}`;

            onSnapshot(collection(db, "users"), async (usersSnapshot) => {
                let allPlatformUsers = [];
                usersSnapshot.forEach(docNode => {
                    allPlatformUsers.push({ docId: docNode.id, ...docNode.data() });
                });

                const activeUserNode = allPlatformUsers.find(u => u.userId === window.sessionUserIdentityId);
                if (!activeUserNode) {
                    resetDashboardToZeroState();
                    return;
                }

                let teamANodes = allPlatformUsers.filter(u => u.referredBy === window.sessionUserIdentityId);
                
                let teamBNodes = [];
                teamANodes.forEach(aNode => {
                    let subsetB = allPlatformUsers.filter(u => u.referredBy === aNode.userId);
                    teamBNodes.push(...subsetB);
                });

                const totalTeamCountCombined = teamANodes.length + teamBNodes.length;
                document.getElementById('lblDisplayTeamCount').innerText = ` ${totalTeamCountCombined}`;

                if (totalTeamCountCombined === 0) {
                    resetDashboardToZeroState();
                    return;
                }

                onSnapshot(collection(db, "deposits"), (ordersSnapshot) => {
                    let approvedOrdersLogs = [];
                    ordersSnapshot.forEach(orderDoc => {
                        const orderData = orderDoc.data();
                        if (orderData.status === 'Approved' || orderData.status === 'Success') {
                            approvedOrdersLogs.push(orderData);
                        }
                    });

                    let accumulatedTotalCommissionValue = 0;
                    let accumulatedTotalTeamRechargeValue = 0;
                    let weeklyQuotaTotalA = 0;
                    let weeklyQuotaTotalAB = 0;

                    const container = document.getElementById('boxTeamUsersListContainer');
                    container.innerHTML = '';

                    // Team A Elements Processing
                    teamANodes.forEach(userA => {
                        const userOrdersList = approvedOrdersLogs.filter(o => o.userId === userA.userId);
                        
                        let individualTotalRechargeLife = 0;

                        userOrdersList.forEach(order => {
                            const orderAmt = parseFloat(order.baseInr || order.amount || 0);
                            individualTotalRechargeLife += orderAmt;
                            accumulatedTotalTeamRechargeValue += orderAmt;

                            if (checkTimestampInsideTimeframeScope(order.createdAt || order.timestamp, currentActiveTimeScopeFilter)) {
                                weeklyQuotaTotalA += orderAmt;
                                weeklyQuotaTotalAB += orderAmt;
                            }
                        });

                        const computedIndividualCommissionA = (individualTotalRechargeLife * (commRateA / 100));
                        accumulatedTotalCommissionValue += computedIndividualCommissionA;

                        const subDownlinesCountValue = allPlatformUsers.filter(u => u.referredBy === userA.userId).length;

                        const rowNode = document.createElement('div');
                        rowNode.className = "bg-white border border-gray-100 rounded-2xl p-4 flex items-center space-x-4 shadow-2xs hover:border-gray-200 transition-all text-left";
                        rowNode.innerHTML = `
                            <div class="w-11 h-11 rounded-full bg-slate-900 overflow-hidden flex items-center justify-center text-white font-bold shrink-0 shadow-xs">
                                <i class="fa-solid fa-user-astronaut text-base text-cyan-400"></i>
                            </div>
                            <div class="flex-1 min-w-0 space-y-0.5">
                                <div class="flex justify-between items-center">
                                    <h4 class="text-sm font-black text-gray-900 truncate">UserId: ${userA.userId} <span class="text-[9px] text-[#1E56B2] font-black uppercase tracking-widest bg-blue-50 px-1 rounded">Team A</span></h4>
                                    <span class="text-xs text-gray-400 font-bold flex items-center gap-1"><i class="fa-regular fa-user text-[10px]"></i> ${subDownlinesCountValue}</span>
                                </div>
                                <p class="text-[11px] font-mono text-gray-700 font-black">Phone: +91 ${userA.phone || 'N/A'}</p>
                                <div class="flex justify-between items-center text-[11px] font-bold text-gray-500 pt-1">
                                    <span>Recharge: <span class="text-gray-900 font-extrabold">₹${individualTotalRechargeLife.toFixed(0)}</span></span>
                                    <span>Comm: <span class="text-emerald-600 font-black">₹${computedIndividualCommissionA.toFixed(2)}</span></span>
                                </div>
                            </div>
                        `;
                        container.appendChild(rowNode);
                    });

                    // Team B Elements Processing
                    teamBNodes.forEach(userB => {
                        const userOrdersListB = approvedOrdersLogs.filter(o => o.userId === userB.userId);
                        
                        let individualTotalRechargeLifeB = 0;

                        userOrdersListB.forEach(order => {
                            const orderAmt = parseFloat(order.baseInr || order.amount || 0);
                            individualTotalRechargeLifeB += orderAmt;
                            accumulatedTotalTeamRechargeValue += orderAmt;

                            if (checkTimestampInsideTimeframeScope(order.createdAt || order.timestamp, currentActiveTimeScopeFilter)) {
                                weeklyQuotaTotalAB += orderAmt;
                            }
                        });

                        const computedIndividualCommissionB = (individualTotalRechargeLifeB * (commRateB / 100));
                        accumulatedTotalCommissionValue += computedIndividualCommissionB;

                        const subDownlinesCountValueB = allPlatformUsers.filter(u => u.referredBy === userB.userId).length;

                        const rowNodeB = document.createElement('div');
                        rowNodeB.className = "bg-white border border-gray-100 rounded-2xl p-4 flex items-center space-x-4 shadow-2xs hover:border-gray-200 transition-all text-left";
                        rowNodeB.innerHTML = `
                            <div class="w-11 h-11 rounded-full bg-slate-700 overflow-hidden flex items-center justify-center text-white font-bold shrink-0 shadow-xs">
                                <i class="fa-solid fa-user-astronaut text-base text-amber-400"></i>
                            </div>
                            <div class="flex-1 min-w-0 space-y-0.5">
                                <div class="flex justify-between items-center">
                                    <h4 class="text-sm font-black text-gray-900 truncate">UserId: ${userB.userId} <span class="text-[9px] text-amber-700 font-black uppercase tracking-widest bg-amber-50 px-1 rounded">Team B</span></h4>
                                    <span class="text-xs text-gray-400 font-bold flex items-center gap-1"><i class="fa-regular fa-user text-[10px]"></i> ${subDownlinesCountValueB}</span>
                                </div>
                                <p class="text-[11px] font-mono text-gray-700 font-black">Phone: +91 ${userB.phone || 'N/A'}</p>
                                <div class="flex justify-between items-center text-[11px] font-bold text-gray-500 pt-1">
                                    <span>Recharge: <span class="text-gray-900 font-extrabold">₹${individualTotalRechargeLifeB.toFixed(0)}</span></span>
                                    <span>Comm: <span class="text-emerald-600 font-black">₹${computedIndividualCommissionB.toFixed(2)}</span></span>
                                </div>
                            </div>
                        `;
                        container.appendChild(rowNodeB);
                    });

                    document.getElementById('lblDisplayCommission').innerText = accumulatedTotalCommissionValue.toFixed(2);
                    document.getElementById('lblDisplayTeamRecharge').innerText = accumulatedTotalTeamRechargeValue.toFixed(0);
                    document.getElementById('lblDisplayQuotaA').innerText = weeklyQuotaTotalA.toFixed(1);
                    document.getElementById('lblDisplayQuotaAB').innerText = weeklyQuotaTotalAB.toFixed(1);
                });
            });
        };

        function resetDashboardToZeroState() {
            document.getElementById('lblDisplayCommission').innerText = '0.00';
            document.getElementById('lblDisplayTeamRecharge').innerText = '0';
            document.getElementById('lblDisplayQuotaA').innerText = '0.0';
            document.getElementById('lblDisplayQuotaAB').innerText = '0.0';
            document.getElementById('boxTeamUsersListContainer').innerHTML = `
                <div class="text-center py-8 text-gray-400 text-xs font-medium italic bg-gray-50 border border-dashed border-gray-200 rounded-2xl">
                    No active referral downline nodes bounds found under this account hierarchy stack link.
                </div>`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            listenCommissionConfigurationParameters();
        });
    </script>
</body>
</html>
