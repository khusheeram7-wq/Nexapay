<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPay - Recharge History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8F9FA] flex justify-center items-center min-h-screen">

    <div class="bg-white w-full max-w-md min-h-screen md:min-h-[850px] flex flex-col justify-between shadow-xl md:rounded-3xl overflow-hidden relative border border-gray-100">
        
        <div class="px-4 pt-6 pb-2 bg-white sticky top-0 z-50 border-b border-gray-50">
            <div class="flex items-center justify-between h-10">
                <button onclick="window.location.href='me.html'" class="text-gray-800 text-lg w-10 text-left cursor-pointer">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h1 class="text-base font-black text-gray-900 tracking-tight flex-1 text-center">Recharge History</h1>
                <div class="w-10"></div> 
            </div>

            <div class="flex mt-4 border-b border-gray-100">
                <button onclick="switchCurrencyTab('USDT')" id="btnTabCurrency-USDT" class="flex-1 pb-3 text-sm font-bold text-gray-400 transition-all cursor-pointer relative">
                    USDT
                </button>
                <button onclick="switchCurrencyTab('INR')" id="btnTabCurrency-INR" class="flex-1 pb-3 text-sm font-bold text-gray-400 transition-all cursor-pointer relative">
                    INR
                </button>
            </div>

            <div id="statusSubFilterContainer" class="flex items-center space-x-6 overflow-x-auto py-3 px-1 hide-scrollbar text-xs font-bold text-gray-400 select-none">
                <button onclick="applyStatusSubFilter('All')" id="subFilter-All" class="whitespace-nowrap transition-all cursor-pointer text-gray-900 border-b-2 border-black pb-1">All</button>
                <button onclick="applyStatusSubFilter('Pending')" id="subFilter-InPayment" class="whitespace-nowrap transition-all cursor-pointer pb-1">In Payment</button>
                <button onclick="applyStatusSubFilter('Approved')" id="subFilter-Success" class="whitespace-nowrap transition-all cursor-pointer pb-1">Success</button>
                <button onclick="applyStatusSubFilter('Timeout')" id="subFilter-Timeout" class="whitespace-nowrap transition-all cursor-pointer pb-1">Timeout</button>
                <button onclick="applyStatusSubFilter('Rejected')" id="subFilter-Cancel" class="whitespace-nowrap transition-all cursor-pointer pb-1">Cancel</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-2 hide-scrollbar bg-white space-y-3">
            
            <div id="bannerTaskReminder" class="bg-[#EEF2FF] rounded-xl p-3.5 flex items-center space-x-2 text-[11px] font-bold text-gray-700 border border-indigo-50/50">
                <div class="w-5 h-5 bg-amber-400 rounded-full flex items-center justify-center text-white text-xs shrink-0 shadow-3xs">
                    <i class="fa-solid fa-coins"></i>
                </div>
                <span>Complete a task to earn Commission and Bonus</span>
            </div>

            <div id="boxHistoryLogsRenderContainer" class="divide-y divide-gray-100/70">
                <div class="text-center py-20 text-xs text-gray-400 italic font-medium">Connecting database cloud matrix streams...</div>
            </div>

        </div>

        <div class="bg-white border-t border-gray-100 px-2 py-2.5 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-40">
            <button onclick="window.location.href='home.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-house text-lg"></i> <span class="text-[10px] tracking-wide">Home</span>
            </button>
            <button onclick="window.location.href='deposit.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-right-left text-lg"></i> <span class="text-[10px] tracking-wide">Deposit</span>
            </button>
            <button onclick="window.location.href='upi.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-briefcase text-lg"></i> <span class="text-[10px] tracking-wide">UPI</span>
            </button>
            <button onclick="window.location.href='team.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-chart-pie text-lg"></i> <span class="text-[10px] tracking-wide">Team</span>
            </button>
            <button onclick="window.location.href='me.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-[#1E56B2] font-bold transition-all cursor-pointer">
                <i class="fa-solid fa-user-astronaut text-lg"></i> <span class="text-[10px] tracking-wide">Me</span>
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, query, where, onSnapshot, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHoR7wojkpTZZPR-gcfDnPW8aOTuoiaAU",
            authDomain: "nexapay-342d0.firebaseapp.com",
            databaseURL: "https://nexapay-342d0-default-rtdb.firebaseio.com",
            projectId: "nexapay-342d0",
            storageBucket: "nexapay-342d0.firebasestorage.app",
            messagingSenderId: "305096071099",
            appId: "1:305096071099:web:3db1e75a2669adbcae569e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let activeCurrencyTabMode = localStorage.getItem('history_target_tab') || 'INR';
        let activeStatusSubFilterKey = 'All';
        let localTasksSlabCache = [];

        async function fetchSlabsCacheMatrix() {
            try {
                const qTasks = query(collection(db, "tasks"), orderBy("amount", "asc"));
                const querySnap = await getDocs(qTasks);
                querySnap.forEach(d => localTasksSlabCache.push(d.data()));
            } catch(err) {
                console.error("Cache processing error: ", err);
            }
            window.loadSyncActiveLedgerStream();
        }

        window.loadSyncActiveLedgerStream = function() {
            const container = document.getElementById('boxHistoryLogsRenderContainer');
            const targetUserUid = localStorage.getItem('sessionUserIdentityId') || '20012144';

            if(!container) return;

            const historyQuery = query(
                collection(db, "deposits"), 
                where("userId", "==", targetUserUid),
                where("type", "==", activeCurrencyTabMode)
            );

            onSnapshot(historyQuery, (snapshot) => {
                container.innerHTML = '';
                
                if (snapshot.empty) {
                    container.innerHTML = `<div class="text-center py-24 text-xs font-bold text-gray-300 italic">No transaction records mapped inside database.</div>`;
                    return;
                }

                let executionRowCounter = 0;
                let rowsArray = [];
                
                snapshot.forEach(docNode => {
                    rowsArray.push({ id: docNode.id, ...docNode.data() });
                });
                
                rowsArray.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

                rowsArray.forEach((row) => {
                    let amountValue = parseFloat(row.amount || 0);
                    let statusLabel = row.status || 'Pending';
                    let transactionDate = row.createdAt || 'N/A';
                    let referenceNumber = row.utr || row.txid || '';

                    let analyticalStatus = statusLabel;
                    if(statusLabel === 'Success') analyticalStatus = 'Approved';
                    if(statusLabel === 'Cancel' || statusLabel === 'Failed') analyticalStatus = 'Rejected';

                    if (activeStatusSubFilterKey !== 'All' && analyticalStatus !== activeStatusSubFilterKey) {
                        return;
                    }

                    executionRowCounter++;
                    const cardNode = document.createElement('div');
                    cardNode.className = "py-4 flex flex-col text-left bg-white border-b border-gray-100 last:border-0 w-full animate-fade-in";

                    let badgeColorStyle = "text-amber-500 bg-amber-50 border border-amber-100";
                    let displayStatusName = "In Payment";
                    let textStatusColor = "text-amber-500";

                    if (statusLabel === "Approved" || statusLabel === "Success") {
                        badgeColorStyle = "text-green-600 bg-green-50 border border-green-100";
                        displayStatusName = "Success";
                        textStatusColor = "text-green-500";
                    } else if (statusLabel === "Rejected" || statusLabel === "Cancel" || statusLabel === "Failed") {
                        badgeColorStyle = "text-red-500 bg-red-50 border border-red-100";
                        displayStatusName = "Cancel";
                        textStatusColor = "text-red-500";
                    } else if (statusLabel === "Timeout") {
                        badgeColorStyle = "text-gray-400 bg-gray-50 border border-gray-200";
                        displayStatusName = "Timeout";
                        textStatusColor = "text-gray-400";
                    }

                    if (activeCurrencyTabMode === 'INR') {
                        const targetMatch = localTasksSlabCache.find(t => parseFloat(t.amount) === amountValue);
                        const appliedPercent = targetMatch ? parseFloat(targetMatch.percent) : 6;
                        
                        const incomeValue = (amountValue * appliedPercent / 100);
                        const totalQuotaRewardPool = amountValue + incomeValue;

                        cardNode.innerHTML = `
                            <div class="space-y-1 w-full pr-2">
                                <div class="flex items-center space-x-2 mb-2">
                                    <span class="text-base font-black text-gray-900">${amountValue.toFixed(0)} RS</span>
                                    <span class="px-2 py-0.5 rounded text-[9px] font-black tracking-wide uppercase ${badgeColorStyle}">${displayStatusName}</span>
                                </div>
                                <div class="text-[11px] font-bold text-gray-400 w-full">
                                    <div class="flex justify-between text-gray-400 mb-0.5">
                                        <span>Income (${appliedPercent}%)</span>
                                        <span class="pr-12">Quota</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-gray-800 font-extrabold">₹${incomeValue.toFixed(0)}</span>
                                        <span class="text-emerald-500 font-black pr-8">+₹${totalQuotaRewardPool.toFixed(0)}</span>
                                    </div>
                                    <div class="text-[10px] text-gray-400 font-mono mt-2 flex justify-between items-center border-t border-gray-50 pt-2">
                                        <span>Time: ${transactionDate}</span>
                                        ${referenceNumber ? `<span class="font-bold text-gray-600">UTR: ${referenceNumber}</span>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    } else {
                        // 🚨 USDT HISTORY INTERFACE LAYER MATCHING SCREENSHOT EXACTLY 🚨
                        const usdtTotalInrReturn = parseFloat(row.totalInr || (amountValue * 90));
                        cardNode.innerHTML = `
                            <div class="w-full bg-white p-2 rounded-2xl">
                                <div class="flex justify-between items-center w-full mb-4">
                                    <span class="text-[17px] font-extrabold text-blue-600 tracking-tight">${amountValue.toFixed(0)} USDT</span>
                                    <span class="px-2.5 py-0.5 rounded text-[9px] font-black tracking-wide uppercase ${badgeColorStyle}">${displayStatusName}</span>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-y-3 text-xs font-bold text-gray-400">
                                    <div>
                                        <span class="text-gray-400 block text-[10px] font-semibold uppercase tracking-wider">GET (INR TOKEN)</span>
                                        <span class="text-green-600 font-black text-sm mt-0.5 block">₹${usdtTotalInrReturn.toFixed(2)}</span>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 block text-[10px] font-semibold uppercase tracking-wider">TXID</span>
                                        <span class="text-gray-800 font-mono font-bold mt-0.5 block break-all tracking-tighter">${referenceNumber || 'N/A'}</span>
                                    </div>
                                    <div class="pt-1">
                                        <span class="text-gray-400 block text-[10px] font-semibold uppercase tracking-wider">Status</span>
                                        <span class="${textStatusColor} font-bold mt-0.5 block">${row.remark ? 'Deposit completed' : 'Deposit completed'}</span>
                                    </div>
                                    <div class="pt-1">
                                        <span class="text-gray-400 block text-[10px] font-semibold uppercase tracking-wider">TIME</span>
                                        <span class="text-gray-500 font-mono mt-0.5 block font-medium">${transactionDate}</span>
                                    </div>
                                </div>
                                ${row.remark ? `<div class="text-[11px] text-red-500 font-bold mt-3 p-2 bg-red-50 rounded-xl border border-red-100">Reason: ${row.remark}</div>` : ''}
                            </div>`;
                    }
                    container.appendChild(cardNode);
                });

                if (executionRowCounter === 0) {
                    container.innerHTML = `<div class="text-center py-24 text-xs font-bold text-gray-300 italic">No matching transactions inside this sub-category tab.</div>`;
                }
            });
        };

        window.switchCurrencyTab = function(targetCurrencyCode) {
            activeCurrencyTabMode = targetCurrencyCode;
            localStorage.setItem('history_target_tab', targetCurrencyCode);
            activeStatusSubFilterKey = 'All'; 

            const subFiltersBlock = document.getElementById('statusSubFilterContainer');
            if (targetCurrencyCode === 'USDT') {
                if(subFiltersBlock) subFiltersBlock.classList.add('opacity-0', 'pointer-events-none');
            } else {
                if(subFiltersBlock) subFiltersBlock.classList.remove('opacity-0', 'pointer-events-none');
            }

            syncCurrencyTabsUiLayoutHeadersStyles();
            window.applyStatusSubFilter('All');
        };

        window.applyStatusSubFilter = function(filterStatusString) {
            activeStatusSubFilterKey = filterStatusString;
            
            document.querySelectorAll('#statusSubFilterContainer button').forEach(btn => {
                btn.className = "whitespace-nowrap transition-all cursor-pointer pb-1";
            });

            const mapBtnIds = {
                'All': 'subFilter-All',
                'Pending': 'subFilter-InPayment',
                'Approved': 'subFilter-Success',
                'Timeout': 'subFilter-Timeout',
                'Rejected': 'subFilter-Cancel'
            };

            const activeBtn = document.getElementById(mapBtnIds[filterStatusString]);
            if (activeBtn) {
                activeBtn.className = "whitespace-nowrap transition-all cursor-pointer text-gray-900 border-b-2 border-black pb-1 font-black";
            }

            window.loadSyncActiveLedgerStream();
        };

        function syncCurrencyTabsUiLayoutHeadersStyles() {
            const btnUsdt = document.getElementById('btnTabCurrency-USDT');
            const btnInr = document.getElementById('btnTabCurrency-INR');

            if (activeCurrencyTabMode === 'USDT') {
                if(btnUsdt) btnUsdt.className = "flex-1 pb-3 text-base font-black text-black border-b-2 border-black transition-all cursor-pointer";
                if(btnInr) btnInr.className = "flex-1 pb-3 text-sm font-bold text-gray-400 transition-all cursor-pointer";
            } else {
                if(btnInr) btnInr.className = "flex-1 pb-3 text-base font-black text-black border-b-2 border-black transition-all cursor-pointer";
                if(btnUsdt) btnUsdt.className = "flex-1 pb-3 text-sm font-bold text-gray-400 transition-all cursor-pointer";
            }
        }

        syncCurrencyTabsUiLayoutHeadersStyles();
        fetchSlabsCacheMatrix();
    </script>
</body>
</html>
