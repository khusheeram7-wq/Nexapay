<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPay Admin - Team & Commission</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
    </style>

    <script>
        if (localStorage.getItem('nexaAdminAuth') !== 'true') {
            window.location.href = 'index.html'; 
        }
        function adminLogout() {
            if(confirm("Are you sure you want to log out from NexaPay Admin?")) {
                localStorage.removeItem('nexaAdminAuth');
                window.location.href = 'index.html';
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased">

    <div id="sidebarOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-40 z-40 hidden" onclick="toggleSidebar()"></div>

    <aside id="sidebar" class="w-[280px] bg-white border-r border-gray-100 flex flex-col justify-between h-screen fixed left-0 top-0 z-50 transform -translate-x-full md:translate-x-0 sidebar-transition">
        <div class="flex-1 overflow-y-auto no-scrollbar">
            <div class="px-6 py-6 flex items-center justify-between">
                <span class="text-[22px] font-extrabold text-blue-600 tracking-tight">NexaPay</span>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <nav class="mt-2 px-4 space-y-1.5">
                <a href="dashboard.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-border-all w-5 text-center"></i> Dashboard
                </a>
                <a href="deposit.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-wallet w-5 text-center"></i> Deposits
                </a>
                <a href="gateway-settings.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-plug w-5 text-center"></i> Gateway Settings
                </a>
                <a href="user.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-users w-5 text-center"></i> Users
                </a>
                <a href="payouts.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-money-bill-wave w-5 text-center"></i> Payouts
                </a>
                <a href="team-commission.html" class="flex items-center gap-4 px-4 py-3 bg-blue-50 text-blue-600 rounded-xl font-bold text-sm transition">
                    <i class="fa-solid fa-network-wired w-5 text-center"></i> Team & Commission
                </a>
                <a href="reports.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-chart-line w-5 text-center"></i> Reports
                </a>
                <a href="withdrawals.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-building-columns w-5 text-center"></i> Withdrawals
                </a>
                <a href="master-settings.html" class="flex items-center gap-4 px-4 py-3 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-medium text-sm transition">
                    <i class="fa-solid fa-gear w-5 text-center"></i> Master Settings
                </a>
            </nav>
        </div>

        <div class="p-5 border-t border-gray-100 flex items-center justify-between bg-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-100 text-blue-600 font-black rounded-full flex items-center justify-center">A</div>
                <div>
                    <h4 class="text-sm font-bold text-gray-900">Super Admin</h4>
                    <p class="text-[11px] text-gray-400 font-medium">admin@nexapay.com</p>
                </div>
            </div>
            <button onclick="adminLogout()" class="text-gray-400 hover:text-red-500 p-2 rounded-lg transition" title="Logout">
                <i class="fa-solid fa-right-from-bracket text-lg"></i>
            </button>
        </div>
    </aside>

    <main class="md:ml-[280px] min-h-screen pb-12">
        <header class="bg-white px-6 md:px-10 py-5 sticky top-0 z-30 border-b border-gray-100 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-500 text-xl"><i class="fa-solid fa-bars"></i></button>
                <h1 class="text-[20px] font-medium text-gray-800">Team & Commission</h1>
            </div>
            <div class="flex items-center gap-1.5 px-3 py-1.5 bg-green-50 text-green-600 text-xs font-bold rounded-full border border-green-100">
                <span class="w-2 h-2 rounded-full bg-green-500"></span> Active
            </div>
        </header>

        <div class="p-4 md:p-8 max-w-[1000px] mx-auto space-y-6">

            <div class="bg-white p-6 md:p-8 rounded-2xl shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-gray-100">
                <h2 class="text-2xl font-extrabold text-gray-900">Team Commission Overview</h2>
                <p class="text-sm text-gray-500 mt-1 font-medium">Showing <span id="activeTeamCount" class="font-bold text-gray-800">0</span> users with active teams</p>
            </div>

            <div id="teamLeadersContainer" class="space-y-4">
                <div class="text-center py-10 text-gray-400 text-sm font-medium">Loading network data...</div>
            </div>

        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        function toggleRow(userId) {
            const detailRow = document.getElementById(`detail_${userId}`);
            const icon = document.getElementById(`icon_${userId}`);
            
            if (detailRow.classList.contains('hidden')) {
                detailRow.classList.remove('hidden');
                icon.style.transform = "rotate(180deg)";
            } else {
                detailRow.classList.add('hidden');
                icon.style.transform = "rotate(0deg)";
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, getDocs, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ADD YOUR REAL FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Commission Rates (will sync with master settings in future)
        let commRateL1 = 5; // 5% default
        let commRateL2 = 2; // 2% default

        // 1. Fetch Users and Build Network Hierarchy
        onSnapshot(collection(db, "users"), (snapshot) => {
            let allUsers = [];
            snapshot.forEach(docSnap => {
                allUsers.push({ id: docSnap.id, ...docSnap.data() });
            });

            // Find users who have referred someone (Team Leaders)
            const teamLeaders = allUsers.filter(u => {
                // Return true if any user in allUsers has referredBy === this user's ID
                return allUsers.some(subUser => subUser.referredBy === u.userId);
            });

            document.getElementById('activeTeamCount').innerText = teamLeaders.length;
            const container = document.getElementById('teamLeadersContainer');
            container.innerHTML = '';

            if (teamLeaders.length === 0) {
                container.innerHTML = '<div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center text-gray-400 font-medium">No active teams found.</div>';
                return;
            }

            teamLeaders.forEach(leader => {
                // Calculate L1
                const level1Members = allUsers.filter(u => u.referredBy === leader.userId);
                let l1TotalCommission = 0; // In real app, calculate based on their deposits

                // Calculate L2
                let level2Members = [];
                level1Members.forEach(l1 => {
                    const l2 = allUsers.filter(u => u.referredBy === l1.userId);
                    level2Members.push(...l2);
                });
                let l2TotalCommission = 0; // In real app, calculate based on their deposits

                // Calculate Total Team Size & Commission
                const totalTeamSize = level1Members.length + level2Members.length;
                const totalCommission = l1TotalCommission + l2TotalCommission;

                // Build L1 Table Rows
                let l1TableRows = '';
                if(level1Members.length > 0) {
                    level1Members.forEach(m => {
                        l1TableRows += `
                            <tr class="border-b border-gray-100 last:border-0 hover:bg-gray-50 transition">
                                <td class="py-3 px-4 font-bold text-gray-800">${m.userId}</td>
                                <td class="py-3 px-4 text-gray-600">${m.phone || 'N/A'}</td>
                                <td class="py-3 px-4 text-right font-bold text-blue-600">₹0.00</td>
                            </tr>
                        `;
                    });
                } else {
                    l1TableRows = '<tr><td colspan="3" class="py-3 px-4 text-center text-gray-400">No members in Level 1</td></tr>';
                }

                // Build Container HTML
                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-gray-100 overflow-hidden transition-all">
                        <div class="p-4 md:p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 cursor-pointer hover:bg-gray-50/50" onclick="toggleRow('${leader.userId}')">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-lg shadow-sm border border-blue-200">
                                    <i class="fa-regular fa-user"></i>
                                </div>
                                <div>
                                    <h3 class="text-base font-bold text-gray-900">${leader.userId}</h3>
                                    <p class="text-xs text-gray-500 font-medium mt-0.5">${leader.phone || 'No phone'} • ${leader.email || 'No email'}</p>
                                </div>
                            </div>
                            
                            <div class="flex items-center justify-between w-full md:w-auto md:gap-8">
                                <div class="text-center">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Team Size</p>
                                    <p class="text-lg font-black text-gray-800 mt-0.5">${totalTeamSize}</p>
                                </div>
                                <div class="text-center md:text-right">
                                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Commission</p>
                                    <p class="text-lg font-black text-blue-600 mt-0.5">₹${totalCommission.toFixed(2)}</p>
                                </div>
                                <button class="text-gray-400 p-2 md:ml-2">
                                    <i id="icon_${leader.userId}" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
                                </button>
                            </div>
                        </div>

                        <div id="detail_${leader.userId}" class="hidden border-t border-gray-100 bg-gray-50/30 p-4 md:p-6 space-y-6">
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="bg-white border border-gray-100 p-5 rounded-xl shadow-sm">
                                    <p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Level 1</p>
                                    <h4 class="text-2xl font-black text-gray-900">${level1Members.length}</h4>
                                    <p class="text-sm font-bold text-blue-600 mt-1">₹${l1TotalCommission.toFixed(2)}</p>
                                </div>
                                <div class="bg-white border border-gray-100 p-5 rounded-xl shadow-sm">
                                    <p class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2">Level 2</p>
                                    <h4 class="text-2xl font-black text-gray-900">${level2Members.length}</h4>
                                    <p class="text-sm font-bold text-blue-600 mt-1">₹${l2TotalCommission.toFixed(2)}</p>
                                </div>
                            </div>

                            <div class="bg-white border border-blue-100 rounded-xl overflow-hidden shadow-sm">
                                <div class="bg-blue-50/50 px-4 py-3 border-b border-blue-100">
                                    <h4 class="text-sm font-bold text-gray-800">Level 1 Members (${commRateL1}% Commission)</h4>
                                </div>
                                <div class="overflow-x-auto no-scrollbar">
                                    <table class="w-full text-left text-sm whitespace-nowrap">
                                        <thead class="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100">
                                            <tr>
                                                <th class="py-3 px-4">USER ID</th>
                                                <th class="py-3 px-4">PHONE</th>
                                                <th class="py-3 px-4 text-right">COMMISSION</th>
                                            </tr>
                                        </thead>
                                        <tbody class="text-sm">
                                            ${l1TableRows}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
