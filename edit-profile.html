<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="js/auth-guard.js"></script>
    <title>Account Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #f8f9fa; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; background: white; min-height: 100vh; position: relative; }

        /* HEADER */
        .header { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: #fff; }
        .back-btn { font-size: 24px; cursor: pointer; width: 40px; text-decoration: none; color: #000; }
        .header-title { flex: 1; text-align: center; font-weight: bold; margin-right: 40px; }

        /* PROFILE SECTION */
        .avatar-section { text-align: center; padding: 40px 0; }
        .avatar-circle { width: 100px; height: 100px; background: #f0f0f0; border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .avatar-circle img { width: 60%; opacity: 0.5; }

        /* INFO LIST */
        .info-list { padding: 0 15px; }
        .info-card { background: #fff; border: 1px solid #f3f3f3; padding: 18px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; cursor: pointer; }
        .label { color: #333; font-weight: 500; }
        .value { color: #666; display: flex; align-items: center; gap: 10px; }
        .arrow { color: #ccc; }

        /* FULL SCREEN OVERLAYS (Password & PIN) */
        .overlay-page { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; height: 100%; background: #fff; z-index: 1000; display: none; flex-direction: column; }
        
        /* PHOTO 1 STYLE (Password) */
        .input-group { padding: 20px; margin-top: 20px; }
        .input-field { width: 100%; padding: 16px; background: #fafafa; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; outline: none; font-size: 16px; color: #ccc; }
        .black-btn { width: calc(100% - 40px); background: #000; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; margin: 20px; cursor: pointer; position: absolute; bottom: 30px; }

        /* PHOTO 2 STYLE (PIN) */
        .pin-container { padding: 25px; }
        .pin-label { font-weight: bold; margin-bottom: 12px; display: block; font-size: 15px; }
        .pin-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 30px; }
        .pin-box { width: 100%; aspect-ratio: 1; background: #f5f5f5; border: 1px solid #eee; border-radius: 5px; text-align: center; font-size: 20px; outline: none; }
        .grey-btn { width: calc(100% - 40px); background: #8e8e8e; color: #fff; border: none; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 16px; margin: 20px; cursor: pointer; position: absolute; bottom: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- MAIN EDIT PROFILE SCREEN -->
    <div class="header">
        <a href="me.html" class="back-btn">❮</a>
        <div class="header-title">Account Info</div>
    </div>

    <div class="avatar-section">
        <div class="avatar-circle">
            <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png">
        </div>
    </div>

    <div class="info-list">
        <div class="info-card">
            <span class="label">ID</span>
            <span class="value" id="user-id">Loading...</span>
        </div>
        <div class="info-card">
            <span class="label">Phone</span>
            <span class="value" id="user-phone">Loading...</span>
        </div>
        <div class="info-card" onclick="openOverlay('pass')">
            <span class="label">Password</span>
            <span class="value">****** <span class="arrow">❯</span></span>
        </div>
        <div class="info-card" onclick="openOverlay('pin')">
            <span class="label">PIN</span>
            <span class="value"><span class="arrow">❯</span></span>
        </div>
    </div>

    <!-- OVERLAY: CHANGE PASSWORD (Photo 1 Match) -->
    <div id="overlay-pass" class="overlay-page">
        <div class="header">
            <span class="back-btn" onclick="closeOverlay('pass')">❮</span>
            <div class="header-title">Change Password</div>
        </div>
        <div class="input-group">
            <input type="password" class="input-field" placeholder="Old Password">
            <input type="password" class="input-field" placeholder="New Password">
            <input type="password" class="input-field" placeholder="Confirm">
        </div>
        <button class="black-btn" onclick="updatePass()">Submit</button>
    </div>

    <!-- OVERLAY: CHANGE PIN (Photo 2 Match) -->
    <div id="overlay-pin" class="overlay-page">
        <div class="header">
            <span class="back-btn" onclick="closeOverlay('pin')">❮</span>
            <div class="header-title">PIN</div>
        </div>
        <div class="pin-container">
            <span class="pin-label">Old PIN</span>
            <div class="pin-grid">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
            </div>
            <span class="pin-label">New PIN</span>
            <div class="pin-grid">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
            </div>
            <span class="pin-label">Confirm</span>
            <div class="pin-grid">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
                <input type="password" maxlength="1" class="pin-box" onkeyup="moveFocus(this)">
            </div>
        </div>
        <button class="grey-btn" onclick="updatePin()">Submit</button>
    </div>

</div>

<script type="module">
    import { auth, db } from './js/config.js';
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Overlay Controls
    window.openOverlay = (id) => document.getElementById('overlay-' + id).style.display = 'flex';
    window.closeOverlay = (id) => document.getElementById('overlay-' + id).style.display = 'none';

    // PIN Auto Focus
    window.moveFocus = (el) => {
        if (el.value.length === 1) {
            let next = el.nextElementSibling;
            if (next) next.focus();
        }
    };

    // Firebase Data
    auth.onAuthStateChanged((user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                const d = snap.data();
                document.getElementById('user-id').innerText = d.userId || '---';
                document.getElementById('user-phone').innerText = d.phone || '---';
            });
        }
    });

    window.updatePass = () => { alert("Password updated successfully!"); closeOverlay('pass'); };
    window.updatePin = () => { alert("PIN updated successfully!"); closeOverlay('pin'); };
</script>
</body>
</html>
