<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexapay - UPI Binding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .mpin-box { transition: all 0.2s; }
        .mpin-box.active { border-color: #1E56B2; box-shadow: 0 0 0 2px rgba(30,86,178,0.2); }
    </style>
</head>
<body class="bg-[#F8F9FA] flex justify-center items-center min-h-screen">

    <div class="bg-white w-full max-w-md min-h-screen md:min-h-[850px] flex flex-col justify-between shadow-xl md:rounded-3xl overflow-hidden relative border border-gray-100">
        
        <div class="flex-1 overflow-y-auto pb-28 hide-scrollbar">
            <div class="px-5 pt-6 bg-white sticky top-0 z-40">
                <h1 class="text-2xl font-black text-[#1E56B2] tracking-tight">UPI</h1>
                <div class="flex border-b border-gray-100 mt-4 text-sm font-bold">
                    <button onclick="switchTabChannel('receive')" id="mainTab-receive" class="pb-3 px-2 text-[#1E56B2] border-b-2 border-[#1E56B2] mr-6 transition-all cursor-pointer font-black">Receive Payment</button>
                    <button onclick="switchTabChannel('send')" id="mainTab-send" class="pb-3 px-2 text-gray-400 border-b-2 border-transparent transition-all cursor-pointer">Send Payment</button>
                </div>
            </div>

            <div class="p-4">
                <div class="bg-gray-50 rounded-xl p-3.5 flex items-center space-x-3 border border-gray-200">
                    <span class="text-[#1E56B2] text-sm"><i class="fa-solid fa-circle-exclamation"></i></span>
                    <p class="text-xs font-semibold text-gray-500">Please keep your account available</p>
                </div>
                <div class="text-center mt-2">
                    <button class="text-[11px] font-bold text-gray-500 hover:text-gray-800"><i class="fa-regular fa-circle-play mr-1"></i> How to bind UPI?</button>
                </div>
            </div>

            <div class="px-4 space-y-4 mt-2">
                <div class="bg-white rounded-xl overflow-hidden">
                    <div onclick="toggleAccordion('box-available')" class="py-3 flex justify-between items-center bg-white cursor-pointer select-none border-b border-gray-50">
                        <span class="text-sm font-black text-[#1E56B2]">Available <span id="lblCount-active-header">0</span></span>
                        <i id="arrow-box-available" class="fa-solid fa-chevron-up text-xs text-[#1E56B2] transition-transform"></i>
                    </div>
                    <div id="container-available" class="py-3 space-y-4 transition-all"></div>
                </div>

                <div class="bg-white rounded-xl overflow-hidden">
                    <div onclick="toggleAccordion('box-unavailable')" class="py-3 flex justify-between items-center bg-white cursor-pointer select-none border-b border-gray-50">
                        <span class="text-sm font-black text-gray-800">Unavailable <span id="lblCount-inactive-header">0</span></span>
                        <i id="arrow-box-unavailable" class="fa-solid fa-chevron-down text-xs text-gray-400 transition-transform"></i>
                    </div>
                    <div id="container-unavailable" class="py-3 space-y-4 hidden transition-all"></div>
                </div>
            </div>

            <div class="px-5 mt-6 flex space-x-4 text-xs font-bold text-[#1E56B2]">
                <div>Available <span id="lblCount-active" class="text-gray-800 font-black ml-1 text-sm">0</span></div>
                <div class="border-l border-gray-200 h-4"></div>
                <div class="text-gray-400">Unavailable <span id="lblCount-inactive" class="text-gray-800 font-black ml-1 text-sm">0</span></div>
            </div>

            <div class="px-4 mt-5">
                <button onclick="initiateMpinFlow()" class="w-full bg-[#1E56B2] hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-sm shadow-md transition-all cursor-pointer">
                    Add new account
                </button>
            </div>
        </div>

        <!-- 🚨 MPIN MODAL (CUSTOM KEYPAD) 🚨 -->
        <div id="mpinOverlay" class="absolute inset-0 bg-black/50 z-[60] flex flex-col justify-end md:justify-center items-center hidden">
            <div class="bg-white w-full rounded-t-3xl md:rounded-3xl p-6 shadow-2xl animate-slide-up relative">
                <button onclick="closeMpinFlow()" class="absolute top-5 right-5 text-gray-400 text-lg cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
                
                <h3 id="mpinTitleText" class="text-center font-black text-gray-800 text-base mb-6">Please enter PIN</h3>
                
                <div class="flex justify-center gap-3 mb-8">
                    <div class="w-12 h-12 border-2 border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-2xl font-black text-gray-800 mpin-box" id="pinBox-1"></div>
                    <div class="w-12 h-12 border-2 border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-2xl font-black text-gray-800 mpin-box" id="pinBox-2"></div>
                    <div class="w-12 h-12 border-2 border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-2xl font-black text-gray-800 mpin-box" id="pinBox-3"></div>
                    <div class="w-12 h-12 border-2 border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-2xl font-black text-gray-800 mpin-box" id="pinBox-4"></div>
                    <div class="w-12 h-12 border-2 border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-2xl font-black text-gray-800 mpin-box" id="pinBox-5"></div>
                    <div class="w-12 h-12 border-2 border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-2xl font-black text-gray-800 mpin-box" id="pinBox-6"></div>
                </div>

                <!-- Custom Number Pad -->
                <div class="grid grid-cols-3 gap-3 text-center px-4 pb-4">
                    <button onclick="handleKeypad('1')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">1</button>
                    <button onclick="handleKeypad('2')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">2</button>
                    <button onclick="handleKeypad('3')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">3</button>
                    <button onclick="handleKeypad('4')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">4</button>
                    <button onclick="handleKeypad('5')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">5</button>
                    <button onclick="handleKeypad('6')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">6</button>
                    <button onclick="handleKeypad('7')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">7</button>
                    <button onclick="handleKeypad('8')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">8</button>
                    <button onclick="handleKeypad('9')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">9</button>
                    <button class="py-3 text-xl font-semibold rounded-2xl text-gray-400 bg-transparent cursor-default"><i class="fa-solid fa-keyboard"></i></button>
                    <button onclick="handleKeypad('0')" class="py-3 text-2xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors">0</button>
                    <button onclick="handleKeypad('back')" class="py-3 text-xl font-semibold rounded-2xl bg-gray-50 hover:bg-gray-200 active:bg-gray-300 transition-colors text-gray-600"><i class="fa-solid fa-delete-left"></i></button>
                </div>
            </div>
        </div>

        <!-- 🚨 BINDING WIZARD MODAL 🚨 -->
        <div id="wizardOverlay" class="absolute inset-0 bg-black/40 z-50 flex flex-col justify-end hidden">
            <div class="bg-white w-full rounded-t-3xl p-6 space-y-6 shadow-2xl relative max-h-[85%] overflow-y-auto hide-scrollbar">
                <button onclick="closeBindingWizardFlow()" class="absolute top-5 right-5 text-gray-400 text-lg cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
                
                <h2 class="text-center font-black text-gray-900 text-lg">Bind UPI</h2>

                <div class="flex justify-between items-center px-2 text-[10px] font-bold text-gray-400 text-center select-none relative">
                    <div class="absolute top-2.5 left-[15%] right-[15%] h-[2px] bg-gray-100 -z-10"></div>
                    <div id="stepChain-1" class="text-black"><span class="w-5 h-5 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-1 font-black">1</span>Channel</div>
                    <div id="stepChain-2"><span class="w-5 h-5 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-1 font-black">2</span>Phone</div>
                    <div id="stepChain-3"><span class="w-5 h-5 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-1 font-black">3</span>Add UPI</div>
                    <div id="stepChain-4"><span class="w-5 h-5 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-1 font-black">4</span>Result</div>
                </div>

                <!-- STEP 1: CHANNELS -->
                <div id="subframe-step1" class="space-y-3 max-h-[380px] overflow-y-auto pr-1 hide-scrollbar">
                    
                    <div onclick="pickSelectedProvider('PhonePe', 'fa-solid fa-wallet text-purple-600', 'border-purple-200')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-purple-300 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center text-white"><i class="fa-solid fa-p"></i></div>
                        <span class="text-sm font-bold text-gray-900">PhonePe</span>
                    </div>
                    <div onclick="pickSelectedProvider('Paytm', 'fa-solid fa-building-columns text-sky-500', 'border-sky-200')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-sky-300 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-sky-500 flex items-center justify-center text-white"><span class="font-black text-xs">Paytm</span></div>
                        <span class="text-sm font-bold text-gray-900">Paytm</span>
                    </div>
                    <div onclick="pickSelectedProvider('Navi', 'fa-solid fa-compass text-teal-600', 'border-teal-200')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-teal-300 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-teal-600 flex items-center justify-center text-white"><span class="font-black text-xs">n</span></div>
                        <span class="text-sm font-bold text-gray-900">Navi</span>
                    </div>
                    <div onclick="pickSelectedProvider('PhonePe Business', 'fa-solid fa-briefcase text-green-700', 'border-green-200')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-green-300 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-green-700 flex items-center justify-center text-white"><i class="fa-solid fa-p"></i></div>
                        <span class="text-sm font-bold text-gray-900">PhonePeBusiness</span>
                    </div>
                    <div onclick="pickSelectedProvider('Paytm Business', 'fa-solid fa-store text-sky-800', 'border-sky-300')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-sky-400 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-blue-800 flex items-center justify-center text-white"><span class="font-black text-[9px]">Paytm</span></div>
                        <span class="text-sm font-bold text-gray-900">PaytmBusiness</span>
                    </div>
                    <div onclick="pickSelectedProvider('Google Pay', 'fa-brands fa-google text-emerald-600', 'border-emerald-200')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-emerald-300 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-blue-500"><i class="fa-brands fa-google"></i></div>
                        <span class="text-sm font-bold text-gray-900">Google Pay</span>
                    </div>
                    <div onclick="pickSelectedProvider('Mobikwik', 'fa-solid fa-bolt text-blue-600', 'border-blue-200')" class="p-4 border border-gray-100 rounded-2xl flex items-center space-x-4 hover:border-blue-300 cursor-pointer transition-all shadow-sm provider-option">
                        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white font-black italic">M</div>
                        <span class="text-sm font-bold text-gray-900">Mobikwik</span>
                    </div>
                    <div class="mt-4 pt-2">
                        <!-- Next Button logic Fixed -->
                        <button onclick="goToStep2()" class="w-full bg-black hover:bg-gray-800 text-white py-4 rounded-xl font-bold text-sm cursor-pointer shadow-md transition-all">Next</button>
                    </div>
                </div>

                <!-- STEP 2: PHONE -->
                <div id="subframe-step2" class="space-y-5 hidden">
                    <div>
                        <h3 class="text-sm font-black text-gray-900 mb-2">10 Digit Mobile Number</h3>
                        <input type="number" id="txtWizardPhone" placeholder="e.g.. 9876543210" class="w-full px-4 py-4 rounded-xl bg-white border border-gray-300 outline-none focus:border-[#1E56B2] font-bold text-sm">
                    </div>
                    <button onclick="submitWizardPhoneStep()" class="w-full bg-black hover:bg-gray-800 text-white py-4 rounded-xl font-bold text-sm cursor-pointer shadow-md">Confirm</button>
                </div>

                <!-- STEP 3: ADD UPI DETAILS -->
                <div id="subframe-step3" class="space-y-5 hidden">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-black text-gray-900 mb-2">Enter your upi</label>
                            <input type="text" id="txtWizardVpa" placeholder="Enter your upi       @ybl" class="w-full px-4 py-4 rounded-xl bg-white border border-gray-300 outline-none focus:border-[#1E56B2] font-bold font-mono text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-black text-gray-900 mb-2">Enter Upi Holder Name</label>
                            <input type="text" id="txtWizardHolderName" placeholder="Full Name" class="w-full px-4 py-4 rounded-xl bg-white border border-gray-300 outline-none focus:border-[#1E56B2] font-bold text-sm">
                        </div>
                    </div>
                    <button onclick="submitWizardVpaStep()" class="w-full bg-black hover:bg-gray-800 text-white py-4 rounded-xl font-bold text-sm cursor-pointer shadow-md mt-4">Submit</button>
                </div>
            </div>
        </div>

        <!-- FOOTER NAVIGATION -->
        <div class="absolute bottom-0 inset-x-0 bg-white border-t border-gray-100 px-2 py-2.5 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-40">
            <button onclick="window.location.href='home.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-house text-lg"></i> <span class="text-[10px] tracking-wide">Home</span>
            </button>
            <button onclick="window.location.href='deposit.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-right-left text-lg"></i> <span class="text-[10px] tracking-wide">Deposit</span>
            </button>
            <button onclick="window.location.href='upi.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-[#1E56B2] font-black transition-all cursor-pointer">
                <i class="fa-solid fa-briefcase text-lg"></i> <span class="text-[10px] tracking-wide">UPI</span>
            </button>
            <button onclick="window.location.href='team.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-chart-pie text-lg"></i> <span class="text-[10px] tracking-wide">Team</span>
            </button>
            <button onclick="window.location.href='me.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-user-astronaut text-lg"></i> <span class="text-[10px] tracking-wide">Me</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        // Your NexaPay Live Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCHoR7wojkpTZZPR-gcfDnPW8aOTuoiaAU",
            authDomain: "nexapay-342d0.firebaseapp.com",
            databaseURL: "https://nexapay-342d0-default-rtdb.firebaseio.com",
            projectId: "nexapay-342d0",
            storageBucket: "nexapay-342d0.firebasestorage.app",
            messagingSenderId: "305096071099",
            appId: "1:305096071099:web:3db1e75a2669adbcae569e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Globals
        window.activeScopeMode = 'receive'; 
        window.wizardDraft = { provider: '', iconClass: '', borderClass: '', phone: '', vpa: '', holderName: '' };
        window.currentActiveUserSessionUid = localStorage.getItem('sessionUserIdentityId') || 'UID_UNKNOWN';
        
        let firebaseUpiLiveDatasetLogs = [];

        // 🚨 MPIN LOGIC STATE 🚨
        let mpinState = {
            mode: 'VERIFY', 
            input: '',
            tempSaved: '',
            dbMpin: null
        };

        // Realtime Fetching of UPI Accounts
        function subscribeLiveUpiCloudChannelStreams() {
            const upiCollectionRef = collection(db, "user_upi_accounts");
            const userFilterQuery = query(upiCollectionRef, where("ownerUserId", "==", window.currentActiveUserSessionUid));

            onSnapshot(userFilterQuery, (snapshot) => {
                firebaseUpiLiveDatasetLogs = [];
                snapshot.forEach(docNode => {
                    firebaseUpiLiveDatasetLogs.push({ docId: docNode.id, ...docNode.data() });
                });
                window.renderActiveDatasetLayouts();
            });
        }

        // Tab Switching
        window.switchTabChannel = function(scope) {
            window.activeScopeMode = scope;
            document.getElementById('mainTab-receive').className = scope === 'receive' ? "pb-3 px-2 text-[#1E56B2] border-b-2 border-[#1E56B2] mr-6 transition-all cursor-pointer font-black" : "pb-3 px-2 text-gray-400 border-b-2 border-transparent mr-6 transition-all cursor-pointer";
            document.getElementById('mainTab-send').className = scope === 'send' ? "pb-3 px-2 text-[#1E56B2] border-b-2 border-[#1E56B2] transition-all cursor-pointer font-black" : "pb-3 px-2 text-gray-400 border-b-2 border-transparent transition-all cursor-pointer";
            window.renderActiveDatasetLayouts();
        };

        window.toggleAccordion = function(id) {
            const container = document.getElementById(id.replace('box-', 'container-'));
            const arrow = document.getElementById('arrow-' + id);
            container.classList.toggle('hidden');
            arrow.classList.toggle('rotate-180');
        };

        // 🚨 MPIN CORE FUNCTIONS 🚨
        window.initiateMpinFlow = async function() {
            try {
                // Fetch User Details to check if MPIN exists
                const userRef = doc(db, "users", window.currentActiveUserSessionUid);
                const userSnap = await getDoc(userRef);
                
                if (userSnap.exists() && userSnap.data().mpin) {
                    mpinState.mode = 'VERIFY';
                    mpinState.dbMpin = userSnap.data().mpin;
                    document.getElementById('mpinTitleText').innerText = "Please enter PIN";
                } else {
                    mpinState.mode = 'SET_1';
                    document.getElementById('mpinTitleText').innerText = "Set 6-Digit MPIN";
                }
                
                resetMpinBoxes();
                document.getElementById('mpinOverlay').classList.remove('hidden');
            } catch (err) {
                alert("Database connection error. Try again.");
            }
        };

        window.closeMpinFlow = function() {
            document.getElementById('mpinOverlay').classList.add('hidden');
            resetMpinBoxes();
        };

        window.handleKeypad = async function(key) {
            if (key === 'back') {
                mpinState.input = mpinState.input.slice(0, -1);
            } else if (mpinState.input.length < 6) {
                mpinState.input += key;
            }
            
            updateMpinUI();

            if (mpinState.input.length === 6) {
                setTimeout(processMpinCompletion, 200); 
            }
        };

        function updateMpinUI() {
            for (let i = 1; i <= 6; i++) {
                const box = document.getElementById(`pinBox-${i}`);
                if (i <= mpinState.input.length) {
                    box.innerText = '•'; 
                    box.classList.add('border-black');
                } else {
                    box.innerText = '';
                    box.classList.remove('border-black');
                }
            }
        }

        function resetMpinBoxes() {
            mpinState.input = '';
            updateMpinUI();
        }

        async function processMpinCompletion() {
            if (mpinState.mode === 'VERIFY') {
                if (mpinState.input === mpinState.dbMpin) {
                    closeMpinFlow();
                    openBindingWizardFlow(); // Success -> Open Wizard
                } else {
                    alert("Incorrect PIN. Please try again.");
                    resetMpinBoxes();
                }
            } 
            else if (mpinState.mode === 'SET_1') {
                mpinState.tempSaved = mpinState.input;
                mpinState.mode = 'SET_2';
                document.getElementById('mpinTitleText').innerText = "Confirm your MPIN";
                resetMpinBoxes();
            } 
            else if (mpinState.mode === 'SET_2') {
                if (mpinState.input === mpinState.tempSaved) {
                    try {
                        await updateDoc(doc(db, "users", window.currentActiveUserSessionUid), {
                            mpin: mpinState.input
                        });
                        alert("MPIN Set Successfully!");
                        closeMpinFlow();
                        openBindingWizardFlow(); 
                    } catch (err) {
                        alert("Failed to save MPIN. " + err.message);
                        resetMpinBoxes();
                    }
                } else {
                    alert("PINs do not match. Start over.");
                    mpinState.mode = 'SET_1';
                    document.getElementById('mpinTitleText').innerText = "Set 6-Digit MPIN";
                    resetMpinBoxes();
                }
            }
        }

        // 🚨 WIZARD FUNCTIONS 🚨
        window.openBindingWizardFlow = function() {
            window.wizardDraft = { provider: '', iconClass: '', borderClass: '', phone: '', vpa: '', holderName: '' };
            document.getElementById('wizardOverlay').classList.remove('hidden');
            window.advanceWizardFrameStep(1);
        };

        window.closeBindingWizardFlow = function() { 
            document.getElementById('wizardOverlay').classList.add('hidden'); 
        };

        window.advanceWizardFrameStep = function(stepNo) {
            document.getElementById('subframe-step1').classList.add('hidden');
            document.getElementById('subframe-step2').classList.add('hidden');
            document.getElementById('subframe-step3').classList.add('hidden');
            document.getElementById(`subframe-step${stepNo}`).classList.remove('hidden');

            for(let i=1; i<=4; i++) {
                const stepNode = document.getElementById(`stepChain-${i}`);
                const circle = stepNode.querySelector('span');
                if(i <= stepNo) {
                    stepNode.className = "text-black font-black z-10 bg-white px-2";
                    circle.className = "w-5 h-5 bg-black text-white rounded-full flex items-center justify-center mx-auto mb-1 font-bold text-[10px]";
                } else {
                    stepNode.className = "text-gray-400 z-10 bg-white px-2";
                    circle.className = "w-5 h-5 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-1 font-bold text-[10px]";
                }
            }
        };

        // Next Button Handler (Fix applied here)
        window.goToStep2 = function() {
            if(!window.wizardDraft.provider) {
                alert("Please select a provider first!");
                return;
            }
            window.advanceWizardFrameStep(2);
        };

        window.pickSelectedProvider = function(name, iconClass, borderClass) {
            window.wizardDraft.provider = name;
            window.wizardDraft.iconClass = iconClass;
            window.wizardDraft.borderClass = borderClass;
            
            // Highlight selected visual box
            const options = document.querySelectorAll('.provider-option');
            options.forEach(opt => {
                opt.classList.remove('border-blue-500', 'bg-blue-50');
                if(opt.innerText.includes(name)) {
                    opt.classList.add('border-blue-500', 'bg-blue-50');
                }
            });
        };

        window.submitWizardPhoneStep = function() {
            const ph = document.getElementById('txtWizardPhone').value.trim();
            if(ph.length !== 10 || isNaN(ph)) { alert("Enter exact 10 digit Mobile phone number!"); return; }
            window.wizardDraft.phone = ph;
            window.advanceWizardFrameStep(3);
        };

        window.submitWizardVpaStep = async function() {
            const vpaVal = document.getElementById('txtWizardVpa').value.trim().toLowerCase();
            const holderNameVal = document.getElementById('txtWizardHolderName').value.trim();

            if(!vpaVal.includes('@')) { alert("Invalid UPI! Must contain `@`."); return; }
            if(holderNameVal.length < 3) { alert("Please input full account holder name."); return; }
            
            const absoluteDuplicationCheck = firebaseUpiLiveDatasetLogs.some(item => item.vpaAddress.toLowerCase() === vpaVal);
            if(absoluteDuplicationCheck) {
                alert("This UPI ID is already registered in your account.");
                return;
            }

            window.wizardDraft.vpa = vpaVal;
            window.wizardDraft.holderName = holderNameVal;

            const btn = event.target;
            btn.innerHTML = 'Processing...'; btn.disabled = true;

            try {
                await addDoc(collection(db, "user_upi_accounts"), {
                    ownerUserId: window.currentActiveUserSessionUid,
                    scopeChannel: window.activeScopeMode, // 'receive' or 'send'
                    providerName: window.wizardDraft.provider,
                    iconClass: window.wizardDraft.iconClass,
                    phone: window.wizardDraft.phone,
                    vpaAddress: window.wizardDraft.vpa,
                    upiHolderName: window.wizardDraft.holderName,
                    isSaleActive: true, // Auto Active (Authorized)
                    creationTimestamp: Date.now()
                });

                document.getElementById('txtWizardPhone').value = '';
                document.getElementById('txtWizardVpa').value = '';
                document.getElementById('txtWizardHolderName').value = '';

                alert("UPI Added Successfully!");
                window.closeBindingWizardFlow();
            } catch (err) {
                alert("Error connecting to database. Please try again.");
            } finally {
                btn.innerHTML = 'Submit'; btn.disabled = false;
            }
        };

        window.toggleSaleStatusState = async function(docId, currentStatusState) {
            try {
                const targetDocRef = doc(db, "user_upi_accounts", docId);
                await updateDoc(targetDocRef, {
                    isSaleActive: !currentStatusState
                });
            } catch (err) {
                console.error("Status update error: ", err);
            }
        };

        // 🚨 RENDER AVAILABLE / UNAVAILABLE LISTS 🚨
        window.renderActiveDatasetLayouts = function() {
            const availContainer = document.getElementById('container-available');
            const unavailContainer = document.getElementById('container-unavailable');
            
            if(!availContainer || !unavailContainer) return;
            availContainer.innerHTML = ''; unavailContainer.innerHTML = '';

            const filteredSubsetItemsList = firebaseUpiLiveDatasetLogs.filter(item => item.scopeChannel === window.activeScopeMode);
            let activeCount = 0, inactiveCount = 0;

            filteredSubsetItemsList.forEach(account => {
                const targetRow = document.createElement('div');
                targetRow.className = "flex justify-between items-center bg-white border border-gray-100 p-4 rounded-xl shadow-sm";
                
                const isChecked = account.isSaleActive ? 'checked' : '';
                
                // Matches Image 4 and Image 5 styles exactly
                const statusBadgeHtml = account.isSaleActive 
                    ? `<span class="text-teal-500 font-bold text-[11px]">Status: Enabled</span>`
                    : `<span class="text-orange-500 font-bold text-[11px]">Status: Disabled</span>`;
                
                // Switch visual icon based on provider logic
                let iconVisual = `<div class="w-10 h-10 rounded-xl border border-gray-100 flex items-center justify-center bg-white text-xl shadow-sm shrink-0"><i class="${account.iconClass || 'fa-solid fa-wallet text-gray-400'}"></i></div>`;
                
                if(account.providerName === 'PhonePe') iconVisual = `<div class="w-10 h-10 rounded-xl bg-purple-600 flex items-center justify-center text-white text-base font-black shadow-sm shrink-0"><i class="fa-solid fa-p"></i></div>`;
                else if(account.providerName === 'Paytm') iconVisual = `<div class="w-10 h-10 rounded-xl bg-sky-500 flex items-center justify-center text-white text-[10px] font-black shadow-sm shrink-0">Paytm</div>`;
                else if(account.providerName === 'Mobikwik') iconVisual = `<div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white text-base font-black italic shadow-sm shrink-0">M</div>`;
                else if(account.providerName === 'Google Pay') iconVisual = `<div class="w-10 h-10 rounded-xl bg-white border border-gray-100 flex items-center justify-center text-blue-500 text-xl shadow-sm shrink-0"><i class="fa-brands fa-google"></i></div>`;
                else if(account.providerName === 'Navi') iconVisual = `<div class="w-10 h-10 rounded-xl bg-teal-600 flex items-center justify-center text-white text-lg font-black shadow-sm shrink-0">n</div>`;

                targetRow.innerHTML = `
                    <div class="flex items-center space-x-3 truncate">
                        ${iconVisual}
                        <div class="truncate">
                            <h4 class="text-sm font-semibold text-[#1E56B2] underline decoration-1 underline-offset-2">${account.phone}</h4>
                            <p class="text-[11px] font-medium text-gray-400 font-mono mt-0.5 truncate">${account.vpaAddress}</p>
                            <div class="mt-0.5">${statusBadgeHtml}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5 shrink-0 ml-2">
                        <span class="text-[10px] font-bold text-gray-400">sale</span>
                        <label class="relative inline-flex items-center cursor-pointer select-none">
                            <input type="checkbox" ${isChecked} onchange="toggleSaleStatusState('${account.docId}', ${account.isSaleActive})" class="sr-only peer">
                            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#22c55e]"></div>
                        </label>
                    </div>
                `;

                if(account.isSaleActive) { 
                    availContainer.appendChild(targetRow); 
                    activeCount++; 
                } else { 
                    unavailContainer.appendChild(targetRow); 
                    inactiveCount++; 
                }
            });

            document.getElementById('lblCount-active').innerText = activeCount;
            document.getElementById('lblCount-inactive').innerText = inactiveCount;
            document.getElementById('lblCount-active-header').innerText = activeCount;
            document.getElementById('lblCount-inactive-header').innerText = inactiveCount;
        };

        window.addEventListener('DOMContentLoaded', () => {
            subscribeLiveUpiCloudChannelStreams();
            window.switchTabChannel('receive');
        });
    </script>
</body>
</html>
