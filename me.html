    <!-- Firebase SDK Implementation Block -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHoR7wojkpTZZPR-gcfDnPW8aOTuoiaAU",
            authDomain: "nexapay-342d0.firebaseapp.com",
            databaseURL: "https://nexapay-342d0-default-rtdb.firebaseio.com",
            projectId: "nexapay-342d0",
            storageBucket: "nexapay-342d0.firebasestorage.app",
            messagingSenderId: "305096071099",
            appId: "1:305096071099:web:3db1e75a2669adbcae569e",
            measurementId: "G-9S068TQ2CS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core Realtime Sync Pipeline Listener
        function subscribeToUserProfileDatabaseMetrics() {
            const activeUserUid = localStorage.getItem('sessionUserIdentityId') || '20012569';
            const userPhone = localStorage.getItem('userRegisteredPhoneString') || '9983243312';
            
            document.getElementById('lblUserProfileId').innerText = activeUserUid;
            document.getElementById('lblInfoMetaId').innerText = activeUserUid;
            document.getElementById('lblInfoMetaPhone').innerText = userPhone;

            // Firestore Realtime Stream Engine
            const userDocRef = doc(db, "users", activeUserUid);
            onSnapshot(userDocRef, (snapshot) => {
                if (snapshot.exists()) {
                    const matchedUserNode = snapshot.data();
                    
                    // Core Validation Rule: Show balance only if real recharge history exists
                    if (matchedUserNode.hasRecharged === true) {
                        const balPoolVal = parseFloat(matchedUserNode.recharge || '0.00');
                        document.getElementById('lblUserQuotaBalance').innerText = balPoolVal.toFixed(2);
                    } else {
                        document.getElementById('lblUserQuotaBalance').innerText = "0.00";
                    }
                }
            }, (error) => {
                console.error("Firestore real-time gateway exception handler drops: ", error);
            });

            // Fetch Global System Controls (Bonus Settings)
            const globalConfigRef = doc(db, "system_settings", "global_config");
            onSnapshot(globalConfigRef, (snapshot) => {
                if (snapshot.exists()) {
                    const settingsData = snapshot.data();
                    const globalBonusRatio = String(settingsData.bonusRatio || '2');
                    document.getElementById('lblUserRewardRatio').innerText = globalBonusRatio.endsWith('%') ? globalBonusRatio : globalBonusRatio + '%';
                }
            });
        }

        // Global Nav Link Jump Hook Handler
        window.triggerJumpRedirection = function(targetCurrencyHeader) {
            localStorage.setItem('history_target_tab', targetCurrencyHeader);
            window.location.href = 'recharge_history.html';
        };

        window.addEventListener('DOMContentLoaded', () => {
            subscribeToUserProfileDatabaseMetrics();
        });
    </script>

    <!-- Legacy Utility Controls Mapping Section -->
    <script>
        const langPack = {
            en: { edit_profile: "Edit profile", top_up: "Top up", recharge_history: "Recharge History", token_history: "Token History", languages: "Languages", contact_us: "Contact Us", sign_out: "Sign Out", account_info: "Account Info", change_password: "Change Password", submit: "Submit", password: "Password" },
            hi: { edit_profile: "प्रोफ़ाइल संपादित करें", top_up: "टॉप अप करें", recharge_history: "रिचार्ज का इतिहास", token_history: "टोकन का इतिहास", languages: "भाषा बदलें", contact_us: "हमसे संपर्क करें", sign_out: "लॉग आउट करें", account_info: "खाते की जानकारी", change_password: "पासवर्ड बदलें", submit: "जमा करें", password: "पासवर्ड" }
        };

        let activeLanguageMode = localStorage.getItem('appLangMode') || 'en';

        function openProfileSubView(frameId) {
            document.getElementById('subView-mainProfile').classList.add('hidden');
            document.getElementById(frameId).classList.remove('hidden');
        }

        function closeProfileSubView(frameId) {
            document.getElementById(frameId).classList.add('hidden');
            document.getElementById('subView-mainProfile').classList.remove('hidden');
        }

        function toggleLanguageConfiguration() {
            activeLanguageMode = (activeLanguageMode === 'en') ? 'hi' : 'en';
            localStorage.setItem('appLangMode', activeLanguageMode);
            applyLanguageTranslations();
        }

        function applyLanguageTranslations() {
            const dict = langPack[activeLanguageMode];
            document.getElementById('lblCurrentLanguagePill').innerText = activeLanguageMode === 'en' ? 'English' : 'हिंदी';
            
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if(dict[key]) el.innerText = dict[key];
            });
        }

        function openContactSupportOverlay() {
            document.getElementById('modalSupportChannels').classList.remove('hidden');
        }

        function closeContactSupportOverlay() {
            document.getElementById('modalSupportChannels').classList.add('hidden');
        }

        function triggerSupportRedirect(channel) {
            const telegramUrl = localStorage.getItem('adminSupportTelegramUrl') || 'https://t.me/PenguinPaySupport';
            const whatsappUrl = localStorage.getItem('adminSupportWhatsappUrl') || 'https://wa.me/919983243312';
            const targetDestinationLink = (channel === 'telegram') ? telegramUrl : whatsappUrl;
            window.open(targetDestinationLink, '_blank');
        }

        function setupPinInputsAutofocusChain() {
            document.querySelectorAll('.pin-box').forEach((box, idx, arr) => {
                box.oninput = () => {
                    if(box.value.length === 1 && arr[idx + 1]) arr[idx + 1].focus();
                };
                box.onkeydown = (e) => {
                    if(e.key === 'Backspace' && box.value.length === 0 && arr[idx - 1]) arr[idx - 1].focus();
                };
            });
        }

        function submitChangePasswordForm() {
            const oldP = document.getElementById('txtOldPassword').value.trim();
            const newP = document.getElementById('txtNewPassword').value.trim();
            if(!oldP || !newP) { alert("Please complete password input fields!"); return; }
            alert("Success: Account password structure modified successfully!");
            closeProfileSubView('viewFrame-changePassword');
        }

        function submitChangePinSecureData() {
            alert("Success: Secure Authorization Security PIN registered successfully!");
            closeProfileSubView('viewFrame-changePin');
        }

        function triggerClientLogoutAction() {
            if(confirm("Are you sure you want to log out from this session profile string terminal?")) {
                window.location.href = 'register.html';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            setupPinInputsAutofocusChain();
            applyLanguageTranslations();
        });
    </script>
