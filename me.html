<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexaPay - Me Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8F9FA] flex justify-center items-center min-h-screen">

    <div class="bg-white w-full max-w-md min-h-screen md:min-h-[850px] flex flex-col justify-between shadow-xl md:rounded-3xl overflow-hidden relative border border-gray-100">
        
        <div id="subView-mainProfile" class="flex-1 overflow-y-auto pb-24 hide-scrollbar">
            
            <div class="px-5 pt-8 pb-5 text-left bg-white">
                <div onclick="window.location.href='edit-profile.html'" class="flex items-center space-x-2 cursor-pointer select-none">
                    <span data-translate="edit_profile" class="text-lg font-black text-gray-900">Edit profile</span>
                    <i class="fa-solid fa-chevron-down text-xs text-gray-500 pt-0.5"></i>
                </div>
                <div class="text-xs text-gray-400 font-bold mt-1">ID: <span id="lblUserProfileId">Loading...</span></div>

                <div class="mt-5 flex justify-between items-center bg-white border border-gray-100/70 p-5 rounded-2xl shadow-2xs">
                    <div class="space-y-1">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider flex items-center gap-1">
                            <i class="fa-solid fa-chart-pie text-[#1E56B2]"></i> Quota
                        </span>
                        <div class="flex items-baseline">
                            <span id="lblUserQuotaBalance" class="text-3xl font-black text-gray-900">0.00</span>
                            <span class="text-xs font-black ml-1 text-gray-800">INR</span>
                        </div>
                        <p class="text-[10px] font-bold text-gray-400">Reward ratio <span id="lblUserRewardRatio">4%</span></p>
                    </div>
                    <button onclick="window.location.href='deposit.html'" data-translate="top_up" class="bg-black hover:bg-gray-900 text-white text-xs font-black px-6 py-3 rounded-xl shadow-md transition-all cursor-pointer">Top up</button>
                </div>

                <div onclick="window.location.href='team.html'" class="mt-4 bg-gradient-to-r from-slate-900 to-slate-800 text-white p-4 rounded-xl relative overflow-hidden flex items-center justify-between border border-slate-950 cursor-pointer shadow-sm">
                    <div class="space-y-0.5 z-10">
                        <h4 class="text-sm font-black tracking-tight">Invite user <span class="text-amber-400">rewards</span></h4>
                        <p class="text-[10px] font-medium text-slate-400">Earn team commissions program</p>
                    </div>
                    <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center text-xl text-amber-400 z-10"><i class="fa-solid fa-gift"></i></div>
                </div>
            </div>

            <div class="px-4 space-y-2">
                <div onclick="window.location.href='recharge_history.html'" class="p-4 bg-white border border-gray-50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-gray-50/50 transition-colors shadow-3xs">
                    <div class="flex items-center space-x-3 text-xs font-bold text-gray-700">
                        <i class="fa-solid fa-clock-rotate-left w-5 text-gray-400 text-sm"></i> 
                        <span data-translate="recharge_history">Recharge History</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                </div>
                <div onclick="window.location.href='token_history.html'" class="p-4 bg-white border border-gray-50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-gray-50/50 transition-colors shadow-3xs">
                    <div class="flex items-center space-x-3 text-xs font-bold text-gray-700">
                        <i class="fa-solid fa-file-invoice-dollar w-5 text-gray-400 text-sm"></i> 
                        <span data-translate="token_history">Token History</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                </div>
                <div onclick="toggleLanguageConfiguration()" class="p-4 bg-white border border-gray-50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-gray-50/50 transition-colors shadow-3xs select-none">
                    <div class="flex items-center space-x-3 text-xs font-bold text-gray-700"><i class="fa-solid fa-globe w-5 text-gray-400 text-sm"></i> <span data-translate="languages">Languages</span></div>
                    <span id="lblCurrentLanguagePill" class="text-xs font-bold text-gray-400">English </span>
                </div>
                <div onclick="openContactSupportOverlay()" class="p-4 bg-white border border-gray-50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-gray-50/50 transition-colors shadow-3xs">
                    <div class="flex items-center space-x-3 text-xs font-bold text-gray-700"><i class="fa-solid fa-headset w-5 text-gray-400 text-sm"></i> <span data-translate="contact_us">Contact Us</span></div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                </div>
                <div onclick="triggerClientLogoutAction()" class="p-4 bg-white border border-gray-50 rounded-xl flex justify-between items-center cursor-pointer hover:bg-rose-50/30 transition-colors shadow-3xs group">
                    <div class="flex items-center space-x-3 text-xs font-bold text-gray-600 group-hover:text-rose-600"><i class="fa-solid fa-arrow-right-from-bracket w-5 text-gray-400 group-hover:text-rose-400 text-sm"></i> <span data-translate="sign_out">Sign Out</span></div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-xs"></i>
                </div>
            </div>
        </div>

        <div id="modalSupportChannels" class="absolute inset-0 bg-black/40 z-50 flex flex-col justify-end hidden select-none transition-all">
            <div class="bg-white w-full rounded-t-3xl p-6 space-y-6 shadow-2xl animate-slide-up">
                <div class="grid grid-cols-2 gap-4 text-center py-4">
                    <div onclick="triggerSupportRedirect('telegram')" class="p-5 border border-gray-100 rounded-2xl bg-gray-50/60 hover:bg-blue-50/30 cursor-pointer flex flex-col items-center space-y-2 transition-all">
                        <div class="w-12 h-12 rounded-full bg-blue-500 text-white flex items-center justify-center text-xl shadow-xs"><i class="fa-brands fa-telegram"></i></div>
                        <span class="text-xs font-black text-gray-700">Telegram</span>
                    </div>
                    <div onclick="triggerSupportRedirect('whatsapp')" class="p-5 border border-gray-100 rounded-2xl bg-gray-50/60 hover:bg-emerald-50/30 cursor-pointer flex flex-col items-center space-y-2 transition-all">
                        <div class="w-12 h-12 rounded-full bg-emerald-500 text-white flex items-center justify-center text-xl shadow-xs"><i class="fa-brands fa-whatsapp"></i></div>
                        <span class="text-xs font-black text-gray-700">WhatsApp</span>
                    </div>
                </div>
                <button onclick="closeContactSupportOverlay()" class="w-full bg-gray-100 text-gray-600 font-bold py-3.5 rounded-xl text-xs uppercase cursor-pointer">Close</button>
            </div>
        </div>

        <div id="modalLogoutConfirm" class="fixed inset-0 bg-black/50 z-[100] flex flex-col justify-center items-center hidden p-6">
            <div class="bg-white w-full max-w-[320px] rounded-2xl overflow-hidden shadow-2xl animate-scale-up border border-gray-50 text-center">
                <div class="p-6 space-y-3">
                    <p class="text-[14px] font-semibold text-gray-700 leading-relaxed">
                        Logging out of the current account will suspend all functions. Are you sure you want to log out ?
                    </p>
                </div>
                <div class="flex border-t border-gray-100">
                    <button onclick="closeModalWindow('modalLogoutConfirm')" class="flex-1 py-3.5 font-bold text-sm text-gray-500 hover:bg-gray-50 border-r border-gray-100 transition-colors">Cancel</button>
                    <button onclick="executeConfirmedSignOut()" class="flex-1 py-3.5 font-black text-sm text-[#1E56B2] hover:bg-blue-50/20 transition-colors">Confirm</button>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 inset-x-0 bg-white border-t border-gray-100 px-2 py-2.5 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-40">
            <button onclick="window.location.href='home.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-house text-lg"></i> <span class="text-[10px] tracking-wide">Home</span>
            </button>
            <button onclick="window.location.href='deposit.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-right-left text-lg"></i> <span class="text-[10px] tracking-wide">Deposit</span>
            </button>
            <button onclick="window.location.href='upi.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-briefcase text-lg"></i> <span class="text-[10px] tracking-wide">UPI</span>
            </button>
            <button onclick="window.location.href='team.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-gray-400 font-medium transition-all cursor-pointer">
                <i class="fa-solid fa-chart-pie text-lg"></i> <span class="text-[10px] tracking-wide">Team</span>
            </button>
            <button onclick="window.location.href='me.html'" class="footer-tab flex-1 flex flex-col items-center gap-1 text-[#1E56B2] font-bold transition-all cursor-pointer">
                <i class="fa-solid fa-user-astronaut text-lg"></i> <span class="text-[10px] tracking-wide">Me</span>
            </button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHoR7wojkpTZZPR-gcfDnPW8aOTuoiaAU",
            authDomain: "nexapay-342d0.firebaseapp.com",
            databaseURL: "https://nexapay-342d0-default-rtdb.firebaseio.com",
            projectId: "nexapay-342d0",
            storageBucket: "nexapay-342d0.firebasestorage.app",
            messagingSenderId: "305096071099",
            appId: "1:305096071099:web:3db1e75a2669adbcae569e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Core Realtime Sync Pipeline Listener
        function subscribeToUserProfileDatabaseMetrics() {
            const activeUserUid = localStorage.getItem('sessionUserIdentityId') || '20012144';
            
            document.getElementById('lblUserProfileId').innerText = activeUserUid;

            // Firestore Users Realtime Balance Stream Connection
            const userDocRef = doc(db, "users", activeUserUid);
            onSnapshot(userDocRef, (snapshot) => {
                if (snapshot.exists()) {
                    const matchedUserNode = snapshot.data();
                    const liveBalancePool = parseFloat(matchedUserNode.balance || 0);
                    document.getElementById('lblUserQuotaBalance').innerText = liveBalancePool.toFixed(2);
                }
            });

            // Fetch Master Settings Live from Admin Control Panel Node (For Support Info and Rates)
            const masterConfigRef = doc(db, "system_settings", "master_config");
            onSnapshot(masterConfigRef, (snapshot) => {
                if (snapshot.exists()) {
                    const settingsData = snapshot.data();
                    
                    // Reward Percent Display Box Mapping
                    const globalBonusRatio = String(settingsData.depBonusUsdt || '4');
                    document.getElementById('lblUserRewardRatio').innerText = globalBonusRatio.endsWith('%') ? globalBonusRatio : globalBonusRatio + '%';

                    // Save Admin Settings to local storage dynamically for support click redirections
                    if(settingsData.supportTelegram) localStorage.setItem('adminSupportTelegramUrl', settingsData.supportTelegram);
                    if(settingsData.supportWhatsapp) localStorage.setItem('adminSupportWhatsappUrl', `https://wa.me/91${settingsData.supportWhatsapp}`);
                }
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            subscribeToUserProfileDatabaseMetrics();
        });
    </script>

    <script>
        const langPack = {
            en: { edit_profile: "Edit profile", top_up: "Top up", recharge_history: "Recharge History", token_history: "Token History", languages: "Languages", contact_us: "Contact Us", sign_out: "Sign Out" },
            hi: { edit_profile: "प्रोफ़ाइल संपादित करें", top_up: "टॉप अप करें", recharge_history: "रिचार्ज का इतिहास", token_history: "टोकन का इतिहास", languages: "भाषा बदलें", contact_us: "हमसे संपर्क करें", sign_out: "लॉग आउट करें" }
        };

        let activeLanguageMode = localStorage.getItem('appLangMode') || 'en';

        // 🚨 GLOBAL CONFIG LANGUAGE HANDLER FOR FULL APP DYNAMIC SYNC 🚨
        function toggleLanguageConfiguration() {
            activeLanguageMode = (activeLanguageMode === 'en') ? 'hi' : 'en';
            localStorage.setItem('appLangMode', activeLanguageMode);
            applyLanguageTranslations();
            
            // Forces quick frame update notification across app layout states
            alert(activeLanguageMode === 'en' ? "Language changed to English" : "भाषा बदलकर हिंदी कर दी गई है");
        }

        function applyLanguageTranslations() {
            const dict = langPack[activeLanguageMode];
            document.getElementById('lblCurrentLanguagePill').innerText = activeLanguageMode === 'en' ? 'English' : 'हिंदी';
            
            document.querySelectorAll('[data-translate]').forEach(el => {
                const key = el.getAttribute('data-translate');
                if(dict[key]) el.innerText = dict[key];
            });
        }

        function openContactSupportOverlay() { document.getElementById('modalSupportChannels').classList.remove('hidden'); }
        function closeContactSupportOverlay() { document.getElementById('modalSupportChannels').classList.add('hidden'); }
        function closeModalWindow(id) { document.getElementById(id).classList.add('hidden'); }

        function triggerSupportRedirect(channel) {
            const telegramUrl = localStorage.getItem('adminSupportTelegramUrl') || 'https://t.me/NexaPaySupport';
            const whatsappUrl = localStorage.getItem('adminSupportWhatsappUrl') || 'https://wa.me/919875778541';
            const targetDestinationLink = (channel === 'telegram') ? telegramUrl : whatsappUrl;
            window.open(targetDestinationLink, '_blank');
        }

        // 🚨 CONFIRM LOGOUT SCREEN TRIGGER AS PER IMAGE 3 REQUIREMENT 🚨
        function triggerClientLogoutAction() {
            document.getElementById('modalLogoutConfirm').classList.remove('hidden');
        }

        function executeConfirmedSignOut() {
            localStorage.removeItem('sessionUserIdentityId');
            window.location.href = 'index.html'; // Redirects straight to root setup
        }

        window.addEventListener('DOMContentLoaded', () => {
            applyLanguageTranslations();
        });
    </script>
</body>
</html>
